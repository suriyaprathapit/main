<!----------------------------------- form section code start ------------------------------->
<div class="container contact-page-form">
<form class="well form-horizontal" action=" " method="post"  id="contact_form">
<fieldset>
<!-- Form Name -->
<legend>Contact Us</legend>

<!-- row-1 -->
<div class="form-group  row row-1">
    <label class="col-md-2 control-label fname">First Name</label>  
    <div class="col-md-4 inputGroupContainer">
      <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
        <input  name="first_name" placeholder="First Name" class="form-control"  type="text">
      </div>
    </div>
    <label class="col-md-2 control-label lname">Last Name</label> 
    <div class="col-md-4 inputGroupContainer">
      <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
        <input name="last_name" placeholder="Last Name" class="form-control"  type="text">
      </div>
    </div>
</div>

<!-- row-2 -->
<div class="form-group  row row-2">
   <label class="col-md-2 control-label email">E-Mail</label>  
    <div class="col-md-4 inputGroupContainer">
      <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-envelope"></i></span>
        <input name="email" placeholder="E-Mail Address" class="form-control"  type="text">
    </div>
  </div>
   <label class="col-md-2 control-label phone">Phone </label>  
    <div class="col-md-4 inputGroupContainer">
      <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-earphone"></i></span>
        <input name="phone" placeholder="98765 43210" class="form-control" type="text">
    </div>
  </div>
</div>

<!--- row-3 --->
<div class="form-group  row row-3">
  <label class="col-md-2 control-label addresss">Address</label>  
    <div class="col-md-4 inputGroupContainer">
    <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-home"></i></span>
        <input name="address" placeholder="Address" class="form-control" type="text">
    </div>
  </div>
   <label class="col-md-2 control-label city">City</label>  
    <div class="col-md-4 inputGroupContainer">
    <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-home"></i></span>
        <input name="city" placeholder="city" class="form-control"  type="text">
    </div>
  </div>
</div>
      
<!-- row-4 -->
<div class="form-group  row row-3">
   <label class="col-md-2 control-label vehi-type">Vehicle type</label>
    <div class="col-md-4 selectContainer">
    <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-list"></i></span>
    <select name="state" class="form-control selectpicker" >
      <option value=" " >Please select your vehicle </option>
      <option>Bike</option>
      <option>Car</option>
      <option>Bus</option>
    </select>
  </div>
</div>
  <label class="col-md-2 control-label zip-cod">Zip Code</label>  
    <div class="col-md-4 inputGroupContainer">
    <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-home"></i></span>
  <input name="zip" placeholder="Zip Code" class="form-control"  type="text">
    </div>
</div>
</div>

<!-- row-5 --->
<div class="form-group sugg-row">
  <label class="col-md-4 control-label sugg">Your Suggestion</label>
    <div class="col-md-4 inputGroupContainer">
    <div class="input-group">
        <span class="input-group-addon"><i class="glyphicon glyphicon-pencil"></i></span>
          <textarea class="form-control" name="comment" placeholder="Your Suggestion"></textarea>
  </div>
  </div>
</div>

<!-- Button -->
<div class="form-group">
  <label class="col-md-4 control-label"></label>
  <div class="form-button">
    <button type="submit" class="btn btn-warning" >Send <span class="glyphicon glyphicon-send"></span></button>
     <button type="submit" class="btn btn-warning" >Clear <span class="glyphicon glyphicon-refresh"></span></button>
  </div>
</div>

</fieldset>
</form>
</div>
